<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Norsk Kryssord - Master</title>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --accent: #facc15; 
            --track: #bae6fd; --active-yellow: #fef9c3; 
            --correct: #22c55e; --wrong: #ef4444; --reveal: #8b5cf6; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        header { flex-shrink: 0; padding: 10px; background: var(--panel); border-bottom: 1px solid #334155; }
        .header-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        
        #clue-bar { flex-shrink: 0; padding: 12px; background: #334155; color: var(--accent); font-weight: 600; min-height: 60px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; text-align: center; }
        
        .controls { flex-shrink: 0; padding: 8px; background: var(--panel); display: flex; justify-content: center; gap: 6px; border-bottom: 1px solid #334155; }
        
        #grid-container { flex-grow: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 10px; background: #020617; }
        #grid { display: grid; gap: 1px; background: #334155; border: 2px solid #334155; margin: 0 auto; }
        
        .cell { width: 28px; height: 28px; background: white; color: black; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }
        .cell.black { background: var(--bg); border: none; }
        .cell.track { background: var(--track) !important; }
        .cell.active { background: var(--active-yellow) !important; box-shadow: inset 0 0 0 3px #fde047; z-index: 2; }
        
        .cell.correct-mark { background: var(--correct) !important; color: white; }
        .cell.wrong-mark { background: var(--wrong) !important; color: white; }
        
        .number { position: absolute; top: 1px; left: 1px; font-size: 7px; color: #64748b; pointer-events: none; }

        #keyboard { flex-shrink: 0; background: var(--panel); padding: 5px 2px 20px 2px; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 4px; }
        .key { margin: 1px; padding: 12px 0; background: #475569; border-radius: 4px; flex: 1; max-width: 34px; font-weight: bold; font-size: 13px; text-align: center; color: white; box-shadow: 0 3px 0 #0f172a; cursor: pointer; }

        #win { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .win-title { font-size: 3rem; color: var(--accent); margin: 0; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 2001; pointer-events: none; }

        button, select { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: var(--reveal); color: white; }
        .btn-red { background: #ef4444; color: white; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <select id="level-choice" onchange="initGame()" style="flex-grow: 1;">
            <option value="grammar">Grammatikk & Artikler</option>
            <option value="vocab">Vokabular (B1-B2)</option>
            <option value="fun">Moro & Natur</option>
        </select>
        <button class="btn-blue" onclick="initGame()">NYTT BRETT</button>
    </div>
</header>

<div id="clue-bar">Laster oppgaver...</div>

<div class="controls">
    <button class="btn-green" onclick="checkActiveWord()">SJEKK</button>
    <button class="btn-purple" onclick="revealLetter()">BOKSTAV</button>
    <button class="btn-purple" onclick="revealWord()">VIS ORD</button>
    <button class="btn-red" onclick="resetCurrentWord()">TØM</button>
</div>

<div id="grid-container"><div id="grid"></div></div>
<div id="keyboard"></div>

<div id="win">
    <h1 class="win-title">🎉 HURRA!</h1>
    <p id="win-msg" style="margin: 20px 0; font-size: 1.1rem; color: #bae6fd;"></p>
    <button class="btn-blue" style="padding: 15px 30px;" onclick="initGame()">SPILL IGJEN</button>
</div>

<script>
const WORD_BANK = [
    // GRAMMAR
    {w:"EN", c:"Artikkel: Hankjønn (f.eks. ___ stol)", type:"grammar"},
    {w:"EI", c:"Artikkel: Hunkjønn (f.eks. ___ hytte)", type:"grammar"},
    {w:"ET", c:"Artikkel: Intetkjønn (f.eks. ___ hus)", type:"grammar"},
    {w:"DENNE", c:"Peker på noe entall (hankjønn/hunkjønn)", type:"grammar"},
    {w:"DETTE", c:"Peker på noe entall (intetkjønn)", type:"grammar"},
    {w:"DISSE", c:"Peker på noe i flertall", type:"grammar"},
    {w:"FORDI", c:"Brukes for å gi en grunn", type:"grammar"},
    {w:"ELLER", c:"Valg mellom to ting", type:"grammar"},
    {w:"HVIS", c:"Uttrykker en betingelse", type:"grammar"},
    {w:"INGEN", c:"Motsatte av 'alle'", type:"grammar"},
    {w:"MELLOM", c:"I midten av to ting", type:"grammar"},
    {w:"GJENNOM", c:"Fra den ene siden til den andre", type:"grammar"},
    
    // VOCAB (B1-B2)
    {w:"ERFARING", c:"Kunnskap man får fra praksis", type:"vocab"},
    {w:"UTDANNING", c:"Skolegang etter grunnskolen", type:"vocab"},
    {w:"MULIGHET", c:"En sjanse til å gjøre noe", type:"vocab"},
    {w:"ANSVAR", c:"Noe man har når man må passe på noe", type:"vocab"},
    {w:"SAMFUNN", c:"Mennesker som lever sammen i et land", type:"vocab"},
    {w:"FORSKJELL", c:"Det som gjør to ting ulike", type:"vocab"},
    {w:"VURDERE", c:"Å tenke over kvaliteten eller verdien", type:"vocab"},
    {w:"DRØFTE", c:"Å diskutere en sak fra flere sider", type:"vocab"},
    {w:"MILJØ", c:"Naturen og omgivelsene rundt oss", type:"vocab"},
    {w:"SAMARBEID", c:"Å jobbe sammen mot et felles mål", type:"vocab"},
    {w:"TILLIT", c:"Følelsen av å kunne stole på noen", type:"vocab"},

    // FUN
    {w:"BANAN", c:"Lang gul frukt", type:"fun"},
    {w:"KAFFE", c:"Mørk og varm drikk", type:"fun"},
    {w:"NORGE", c:"Landet vårt i nord", type:"fun"},
    {w:"SYKKEL", c:"Kjøretøy med to hjul og pedaler", type:"fun"},
    {w:"SOMMER", c:"Den varmeste årstiden", type:"fun"},
    {w:"VINTER", c:"Årstiden med snø og kulde", type:"fun"},
    {w:"STRAND", c:"Område med sand ved havet", type:"fun"},
    {w:"FISK", c:"Dyr som svømmer i vannet", type:"fun"},
    {w:"ELG", c:"Dyret vi kaller skogens konge", type:"fun"}
];

const FILLERS = [
    {w:"ELV", c:"Vann som renner i naturen"},
    {w:"ÅS", c:"Liten høyde eller fjelltopp"},
    {w:"ØY", c:"Land med vann på alle kanter"},
    {w:"IS", c:"Kald dessert eller frosset vann"},
    {w:"UT", c:"Motsatte av inn"},
    {w:"SE", c:"Å bruke øynene"},
    {w:"TE", c:"Varm drikk laget av blader"}
];

let G = { size: 13, target: 8, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function initGame() {
    const type = document.getElementById('level-choice').value;
    const pool = [...WORD_BANK.filter(w => w.type === type), ...FILLERS].sort(() => Math.random() - 0.5);
    
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {}; G.dir = 'h';
    document.getElementById('win').style.display = 'none';
    removeConfetti();

    // Start block: Try to place the first word
    if (pool.length > 0) {
        forcePlace(pool.pop(), 4, 2, 'h');
    }

    // Generation attempt
    for(let i = 0; i < 3000; i++) {
        if(G.words.length >= G.target || pool.length === 0) break;
        let w = pool[i % pool.length];
        if(G.words.find(ex => ex.w === w.w)) continue;

        for(let p of G.words) {
            for(let j=0; j<w.w.length; j++) {
                let matchIdx = p.w.indexOf(w.w[j]);
                if(matchIdx !== -1) {
                    let nDir = p.dir === 'h' ? 'v' : 'h';
                    let r = nDir === 'v' ? p.cells[matchIdx].r - j : p.cells[matchIdx].r;
                    let c = nDir === 'h' ? p.cells[matchIdx].c - j : p.cells[matchIdx].c;
                    if(isValid(w.w, r, c, nDir)) { 
                        forcePlace(w, r, c, nDir); 
                        break; 
                    }
                }
            }
            if(G.words.find(ex => ex.w === w.w)) break;
        }
    }
    
    // Fail-safe: if grid is empty, just restart once
    if (G.words.length < 2) { setTimeout(initGame, 10); return; }

    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    
    render();
    // Auto-select first cell
    const firstKey = Object.keys(G.grid)[0];
    if(firstKey) selectCell(firstKey);
}

function isValid(w, r, c, d) {
    if(r < 1 || c < 1 || (d==='v' && r+w.length >= G.size-1) || (d==='h' && c+w.length >= G.size-1)) return false;
    for(let i=-1; i<=w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        let cellExist = G.grid[`${rr}-${cc}`];
        if(i === -1 || i === w.length) { if(cellExist) return false; continue; }
        if(cellExist && cellExist !== w[i]) return false;
        if(!cellExist) {
            let neighbors = d==='h' ? [[rr-1,cc],[rr+1,cc]] : [[rr,cc-1],[rr,cc+1]];
            for(let [nr,nc] of neighbors) if(G.grid[`${nr}-${nc}`]) return false;
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i];
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = ""; el.style.gridTemplateColumns = `repeat(${G.size}, 28px)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; d.appendChild(t);
                d.onclick = () => selectCell(k);
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('correct-mark', 'wrong-mark'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k && ws.length > 1) G.dir = (G.dir === 'h' ? 'v' : 'h');
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }

function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let k = `${c.r}-${c.c}`, el = document.getElementById("c-"+k);
        if(G.user[k]) el.classList.add(G.user[k] === aw.w[i] ? "correct-mark" : "wrong-mark");
    });
}

function revealLetter() { if(G.sel) { G.user[G.sel] = G.grid[G.sel]; updateUI(); checkWin(); } }
function revealWord() { 
    let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = G.grid[`${c.r}-${c.c}`]); updateUI(); checkWin(); } 
}
function resetCurrentWord() { 
    let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = ""); updateUI(); } 
}

function checkWin() { 
    if(Object.keys(G.grid).length > 0 && Object.keys(G.grid).every(k => G.user[k] === G.grid[k])) {
        document.getElementById('win-msg').innerText = "Du klarte nivået!";
        document.getElementById('win').style.display='flex';
        spawnConfetti();
    } 
}

function spawnConfetti() {
    const vw = window.innerWidth, vh = window.innerHeight;
    for(let i=0; i<60; i++) {
        let c = document.createElement('div'); c.className = 'confetti';
        c.style.top = (vh/2) + 'px'; c.style.left = (vw/2) + 'px';
        c.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
        document.getElementById('win').appendChild(c);
        const x = (Math.random() - 0.5) * vw * 1.5, y = (Math.random() - 0.5) * vh * 1.5;
        c.animate([{ transform: `translate(0,0) scale(1)`, opacity: 1 }, { transform: `translate(${x}px, ${y}px) scale(0) rotate(720deg)`, opacity: 0 }], { duration: 2500, easing: 'ease-out', fill: 'forwards' });
    }
}
function removeConfetti() { document.querySelectorAll('.confetti').forEach(c => c.remove()); }

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        document.getElementById("c-"+G.sel).classList.add("active");
        aw.cells.forEach(c => document.getElementById(`c-${c.r}-${c.c}`).classList.add('track'));
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => { if(document.getElementById("t-"+k)) document.getElementById("t-"+k).innerText = G.user[k] || ""; });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('correct-mark', 'wrong-mark'));
    let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel);
    if(key === "⌫") { G.user[G.sel] = ""; if(idx > 0) G.sel = `${aw.cells[idx-1].r}-${aw.cells[idx-1].c}`; }
    else { G.user[G.sel] = key; if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`; }
    updateUI(); checkWin();
}

const kb = [["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]];
kb.forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("div"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    document.getElementById("keyboard").appendChild(r);
});

// INITIALIZE ON LOAD
window.onload = initGame;
</script>
</body>
</html>
