<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Norsk Kryssord Master</title>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --accent: #facc15; 
            --track: #bae6fd; --active-yellow: #fef9c3; 
            --correct: #22c55e; --wrong: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #334155; display: flex; gap: 10px; }
        #clue-bar { padding: 12px; background: #334155; color: var(--accent); font-weight: 600; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .controls { padding: 8px; background: var(--panel); display: flex; justify-content: center; gap: 5px; border-bottom: 1px solid #334155; }
        #grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #020617; padding: 5px; }
        #grid { display: grid; gap: 1px; background: #334155; border: 1px solid #334155; }
        .cell { width: 28px; height: 28px; background: white; color: black; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }
        .cell.black { background: var(--bg); border: none; }
        .cell.track { background: var(--track) !important; }
        .cell.active { background: var(--active-yellow) !important; box-shadow: inset 0 0 0 2px var(--accent); }
        .cell.correct-mark { background: var(--correct) !important; color: white; }
        .cell.wrong-mark { background: var(--wrong) !important; color: white; }
        .number { position: absolute; top: 1px; left: 1px; font-size: 7px; color: #64748b; }
        #keyboard { background: var(--panel); padding: 5px 2px 20px 2px; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 4px; }
        .key { margin: 1px; padding: 12px 0; background: #475569; border-radius: 4px; flex: 1; max-width: 32px; font-weight: bold; text-align: center; cursor: pointer; box-shadow: 0 2px 0 #000; }
        #win { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 99; }
        button, select { padding: 8px; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <select id="level-choice" style="flex:1" onchange="initGame()">
        <option value="grammar">Grammatikk & Artikler</option>
        <option value="vocab">Vokabular (B1-B2)</option>
        <option value="fun">Moro & Natur</option>
    </select>
    <button style="background:#2563eb; color:white;" onclick="initGame()">NYTT</button>
</header>

<div id="clue-bar">Velg et nivå...</div>

<div class="controls">
    <button style="background:#10b981; color:white;" onclick="checkActiveWord()">SJEKK</button>
    <button style="background:#8b5cf6; color:white;" onclick="revealLetter()">BOKSTAV</button>
    <button style="background:#8b5cf6; color:white;" onclick="revealWord()">ORD</button>
</div>

<div id="grid-container"><div id="grid"></div></div>
<div id="keyboard"></div>

<div id="win">
    <h1 style="color:var(--accent)">🎉 HURRA!</h1>
    <button style="background:#2563eb; color:white; padding:10px 20px;" onclick="initGame()">SPILL IGJEN</button>
</div>

<script>
const WORD_BANK = [
    {w:"EN", c:"Artikkel: Hankjønn", type:"grammar"},
    {w:"EI", c:"Artikkel: Hunkjønn", type:"grammar"},
    {w:"ET", c:"Artikkel: Intetkjønn", type:"grammar"},
    {w:"DENNE", c:"Pekepronomen (nær)", type:"grammar"},
    {w:"FORDI", c:"Konjunksjon: gir en grunn", type:"grammar"},
    {w:"IKKE", c:"Adverb for nektelse", type:"grammar"},
    {w:"HVIS", c:"Konjunksjon: dersom", type:"grammar"},
    {w:"ERFARING", c:"Kunnskap fra praksis", type:"vocab"},
    {w:"UTDANNING", c:"Skole/studier", type:"vocab"},
    {w:"ANSVAR", c:"Plikt til å passe på", type:"vocab"},
    {w:"SAMFUNN", c:"Folk i et land", type:"vocab"},
    {w:"BANAN", c:"Gul bøyde frukt", type:"fun"},
    {w:"NORGE", c:"Vårt land", type:"fun"},
    {w:"SYKKEL", c:"To hjul og pedaler", type:"fun"},
    {w:"ELG", c:"Skogens konge", type:"fun"}
];
const FILLERS = [{w:"IS", c:"Kald dessert"}, {w:"ØY", c:"Land i vann"}, {w:"UT", c:"Motsatt av inn"}, {w:"SE", c:"Å se"}];

let G = { size: 12, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function initGame() {
    const type = document.getElementById('level-choice').value;
    const pool = [...WORD_BANK.filter(w => w.type === type), ...FILLERS].sort(() => Math.random() - 0.5);
    
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {};
    document.getElementById('win').style.display = 'none';

    // Force start
    forcePlace(pool.pop(), 2, 2, 'h');

    // Build
    for(let attempt=0; attempt<500; attempt++) {
        let w = pool[attempt % pool.length];
        if(G.words.find(ex => ex.w === w.w)) continue;
        for(let p of G.words) {
            for(let i=0; i<w.w.length; i++) {
                let matchIdx = p.w.indexOf(w.w[i]);
                if(matchIdx !== -1) {
                    let nDir = p.dir === 'h' ? 'v' : 'h';
                    let r = nDir === 'v' ? p.cells[matchIdx].r - i : p.cells[matchIdx].r;
                    let c = nDir === 'h' ? p.cells[matchIdx].c - i : p.cells[matchIdx].c;
                    if(isValid(w.w, r, c, nDir)) { forcePlace(w, r, c, nDir); break; }
                }
            }
            if(G.words.length >= 6) break;
        }
    }
    
    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    
    render();
    if(Object.keys(G.grid).length > 0) selectCell(Object.keys(G.grid)[0]);
}

function isValid(w, r, c, d) {
    if(r < 0 || c < 0 || (d==='v' && r+w.length >= G.size) || (d==='h' && c+w.length >= G.size)) return false;
    for(let i=-1; i<=w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        let cellExist = G.grid[`${rr}-${cc}`];
        if(i === -1 || i === w.length) { if(cellExist) return false; continue; }
        if(cellExist && cellExist !== w[i]) return false;
        if(!cellExist) {
            let neighbors = d==='h' ? [[rr-1,cc],[rr+1,cc]] : [[rr,cc-1],[rr,cc+1]];
            for(let [nr,nc] of neighbors) if(G.grid[`${nr}-${nc}`]) return false;
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i];
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = ""; el.style.gridTemplateColumns = `repeat(${G.size}, 28px)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; d.appendChild(t);
                d.onclick = () => selectCell(k);
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('correct-mark', 'wrong-mark'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k && ws.length > 1) G.dir = (G.dir === 'h' ? 'v' : 'h');
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }

function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let k = `${c.r}-${c.c}`, el = document.getElementById("c-"+k);
        if(G.user[k]) el.classList.add(G.user[k] === aw.w[i] ? "correct-mark" : "wrong-mark");
    });
}
function revealLetter() { if(G.sel) { G.user[G.sel] = G.grid[G.sel]; updateUI(); checkWin(); } }
function revealWord() { let aw = getAW(); if(aw) { aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = G.grid[`${c.r}-${c.c}`]); updateUI(); checkWin(); } }

function checkWin() { if(Object.keys(G.grid).every(k => G.user[k] === G.grid[k])) document.getElementById('win').style.display='flex'; }

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        document.getElementById("c-"+G.sel).classList.add("active");
        aw.cells.forEach(c => document.getElementById(`c-${c.r}-${c.c}`).classList.add('track'));
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => { if(document.getElementById("t-"+k)) document.getElementById("t-"+k).innerText = G.user[k] || ""; });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    if(key === "⌫") { G.user[G.sel] = ""; }
    else { G.user[G.sel] = key; let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel); if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`; }
    updateUI(); checkWin();
}

const kb = [["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]];
kb.forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("div"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    document.getElementById("keyboard").appendChild(r);
});

window.addEventListener('load', initGame);
</script>
</body>
</html>
