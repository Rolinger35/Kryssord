<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Master Norsk Kryssord</title>
    <style>
        :root { 
            --bg: #020617; --panel: #0f172a; --accent: #38bdf8; 
            --btn-bg: #1e293b; --text: #f8fafc; --track: #0c4a6e; 
            --active: #facc15; --correct: #10b981; --wrong: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }
        body { margin: 0; height: 100dvh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
        
        /* SLEEK REDESIGNED SELECTOR */
        .mode-selector { 
            display: flex; background: var(--panel); padding: 4px; border-radius: 12px; margin: 10px; border: 1px solid #334155;
        }
        .mode-btn { 
            flex: 1; padding: 10px 5px; border: none; background: transparent; color: #94a3b8; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: var(--bg); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

        #clue-bar { 
            padding: 12px; min-height: 60px; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 0.95rem; line-height: 1.3; border-bottom: 1px solid #1e293b; color: var(--active);
        }
        
        #grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 5px; overflow: auto; }
        #grid { display: grid; gap: 1px; background: #334155; border: 2px solid #334155; border-radius: 4px; }
        
        .cell { width: 19px; height: 19px; background: white; color: black; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 10px; }
        .cell.black { background: var(--bg); border: none; }
        .cell.track { background: #bae6fd !important; }
        .cell.active-cell { background: var(--active) !important; z-index: 2; box-shadow: 0 0 10px var(--active); }
        .cell.correct-mark { background: var(--correct) !important; color: white; }
        .cell.wrong-mark { background: var(--wrong) !important; color: white; }
        .number { position: absolute; top: 0px; left: 1px; font-size: 6px; color: #64748b; }

        .game-tools { display: flex; gap: 8px; padding: 8px; justify-content: center; }
        .tool-btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 800; font-size: 0.75rem; cursor: pointer; color: white; }

        #keyboard { background: var(--panel); padding: 5px 2px 25px 2px; border-radius: 20px 20px 0 0; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 3px; }
        .key { margin: 1px; padding: 12px 0; background: #334155; border-radius: 5px; flex: 1; max-width: 30px; font-weight: bold; text-align: center; font-size: 12px; cursor: pointer; }
        
        #win { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('grammar', this)">GRAMMATIKK</button>
    <button class="mode-btn" onclick="setMode('vocab', this)">VOKABULAR</button>
    <button class="mode-btn" onclick="setMode('fun', this)">MORO & NATUR</button>
</div>

<div id="clue-bar">Velg en kategori...</div>

<div id="grid-container"><div id="grid"></div></div>

<div class="game-tools">
    <button class="tool-btn" style="background:#0ea5e9" onclick="initGame()">NYTT BRETT</button>
    <button class="tool-btn" style="background:#10b981" onclick="checkActiveWord()">SJEKK</button>
    <button class="tool-btn" style="background:#8b5cf6" onclick="revealLetter()">HINT</button>
</div>

<div id="keyboard"></div>

<div id="win">
    <h1 style="color:var(--active); font-size: 2.5rem;">UTMERKET!</h1>
    <p id="win-stat"></p>
    <button class="tool-btn" style="background:var(--accent); padding:15px 30px;" onclick="initGame()">NESTE BRETT</button>

let G = { mode: 'grammar', size: 18, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function setMode(mode, btn) {
    G.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initGame();
}

function initGame() {
    const pool = [...DB[G.mode], ...DB.glue].sort(() => Math.random() - 0.5);
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {};
    document.getElementById('win').style.display = 'none';

    // Start placement
    forcePlace(pool.pop(), Math.floor(G.size/2), 2, 'h');

    // Advanced placement loop
    for(let attempt=0; attempt<8000; attempt++) {
        if(G.words.length >= 26) break;
        let w = pool[attempt % pool.length];
        if(G.words.find(ex => ex.w === w.w)) continue;
        
        // Pick a random placed word to try and intersect with
        let base = G.words[Math.floor(Math.random() * G.words.length)];
        for(let i=0; i<w.w.length; i++) {
            let matchIdx = base.w.indexOf(w.w[i]);
            if(matchIdx !== -1) {
                let nDir = base.dir === 'h' ? 'v' : 'h';
                let r = nDir === 'v' ? base.cells[matchIdx].r - i : base.cells[matchIdx].r;
                let c = nDir === 'h' ? base.cells[matchIdx].c - i : base.cells[matchIdx].c;
                if(isValid(w.w, r, c, nDir)) { 
                    forcePlace(w, r, c, nDir); 
                    break; 
                }
            }
        }
    }
    
    // Auto-Regenerate if below 20 words (Paradox Insurance)
    if (G.words.length < 20) return initGame();

    // Map markers
    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    
    render();
    selectCell(Object.keys(G.grid)[0]);
}

function isValid(w, r, c, d) {
    if(r < 1 || c < 1 || (d==='v' && r+w.length >= G.size-1) || (d==='h' && c+w.length >= G.size-1)) return false;
    for(let i=-1; i<=w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        let cellExist = G.grid[`${rr}-${cc}`];
        if(i === -1 || i === w.length) { if(cellExist) return false; continue; }
        if(cellExist && cellExist !== w[i]) return false;
        if(!cellExist) {
            let n = d==='h' ? [[rr-1,cc],[rr+1,cc]] : [[rr,cc-1],[rr,cc+1]];
            for(let [nr,nc] of n) if(G.grid[`${nr}-${nc}`]) return false;
            // check diagonal ends
            if(i===0 || i===w.length-1) {
                let diag = d==='h' ? [[rr,cc+(i===0?-1:1)]] : [[rr+(i===0?-1:1),cc]];
                if(G.grid[`${diag[0][0]}-${diag[0][1]}`]) return false;
            }
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i].toUpperCase();
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = ""; el.style.gridTemplateColumns = `repeat(${G.size}, 19px)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; d.appendChild(t);
                d.onclick = () => selectCell(k);
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('correct-mark', 'wrong-mark'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k && ws.length > 1) G.dir = (G.dir === 'h' ? 'v' : 'h');
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }

function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let k = `${c.r}-${c.c}`, el = document.getElementById("c-"+k);
        if(G.user[k]) el.classList.add(G.user[k] === aw.w[i].toUpperCase() ? "correct-mark" : "wrong-mark");
    });
}
function revealLetter() { if(G.sel) { G.user[G.sel] = G.grid[G.sel]; updateUI(); checkWin(); } }

function checkWin() { 
    if(Object.keys(G.grid).length > 0 && Object.keys(G.grid).every(k => G.user[k] === G.grid[k])) {
        document.getElementById('win-stat').innerText = `Fullført med ${G.words.length} ord!`;
        document.getElementById('win').style.display='flex';
    } 
}

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active-cell', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        document.getElementById("c-"+G.sel).classList.add("active-cell");
        aw.cells.forEach(c => { let cel = document.getElementById(`c-${c.r}-${c.c}`); if(cel) cel.classList.add('track'); });
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => { if(document.getElementById("t-"+k)) document.getElementById("t-"+k).innerText = G.user[k] || ""; });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    if(key === "⌫") { G.user[G.sel] = ""; }
    else { G.user[G.sel] = key; let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel); if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`; }
    updateUI(); checkWin();
}

const kb = [["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]];
kb.forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("div"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    document.getElementById("keyboard").appendChild(r);
});

window.onload = initGame;
</script>
